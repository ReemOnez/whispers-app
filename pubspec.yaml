name: whispers_app
description: "Whispers — an unsent confession space. Nocturne design system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.0.0
  
  # Responsive design
  flutter_screenutil: ^5.9.0
  
  # Typography
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  phosphor_flutter: ^2.1.0

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  image_picker: ^1.2.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
